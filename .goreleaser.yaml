version: 2

builds:
  - id: passgen
    main: .
    binary: passgen
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - darwin
      - linux
    goarch:
      - arm64
      - amd64
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - id: passgen
    ids:
      - passgen
    formats:
      - tar.gz
    format_overrides:
      - goos: darwin
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - ids:
      - passgen
    repository:
      owner: youyo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/youyo/passgen"
    description: "Simple and secure password generator CLI tool"
    license: "MIT"
    install: |
      bin.install "passgen"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
